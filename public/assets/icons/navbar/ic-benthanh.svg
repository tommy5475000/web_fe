
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 256" width="512" height="256">
<style>
.line{fill:none;stroke:#000;stroke-width:8;stroke-linecap:round;stroke-linejoin:round}
</style>

<!-- base line -->
<line class="line" x1="20" y1="220" x2="492" y2="220"/>

<!-- side buildings -->
<rect class="line" x="40" y="150" width="90" height="70"/>
<rect class="line" x="382" y="150" width="90" height="70"/>

<!-- side doors -->
<path class="line" d="M70 220 v-35 a15 15 0 0 1 30 0 v35"/>
<path class="line" d="M412 220 v-35 a15 15 0 0 1 30 0 v35"/>

<!-- middle wings -->
<rect class="line" x="130" y="130" width="90" height="90"/>
<rect class="line" x="292" y="130" width="90" height="90"/>

<!-- windows -->
<line class="line" x1="150" y1="160" x2="200" y2="160"/>
<line class="line" x1="150" y1="175" x2="200" y2="175"/>
<line class="line" x1="312" y1="160" x2="362" y2="160"/>
<line class="line" x1="312" y1="175" x2="362" y2="175"/>

<!-- center building -->
<rect class="line" x="210" y="90" width="92" height="130"/>

<!-- main door -->
<path class="line" d="M235 220 v-55 a21 21 0 0 1 42 0 v55"/>

<!-- clock -->
<circle class="line" cx="256" cy="125" r="18"/>
<line class="line" x1="256" y1="125" x2="256" y2="113"/>
<line class="line" x1="256" y1="125" x2="267" y2="132"/>

<!-- tower -->
<rect class="line" x="230" y="45" width="52" height="45"/>

<!-- tower roof -->
<polygon class="line" points="220,45 292,45 256,20"/>
</svg>
